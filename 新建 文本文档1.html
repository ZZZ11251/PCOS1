<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCOS（多囊卵巢综合征）循证教育助手 - 离线独立版</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;750&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AlpineJS (Minimal reactive controller) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans flex flex-col min-h-screen selection:bg-teal-100 selection:text-teal-900 pb-16" x-data="pcosApp()" x-cloak>

  <!-- Navigation -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm no-print">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="p-2 bg-gradient-to-br from-teal-500 to-emerald-500 rounded-xl text-white shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-stethoscope"><path d="M4.8 2.3A.3.3 0 1 0 5 2h-.2Z"/><path d="M10 2v4a4 4 0 0 0 8 0V2"/><path d="M12 2v1"/><path d="M16 2v1"/><path d="M22 6h-4"/><path d="M9 10H6.2A4.2 4.2 0 0 0 2 14.1v3.8A4.1 4.1 0 0 0 6.1 22h6.8a4.1 4.1 0 0 0 4.1-4.1V15c0-1.8-1.5-3-3.2-3H12"/></svg>
        </div>
        <div>
          <span class="font-bold text-slate-950 tracking-tight block text-sm md:text-base">PCOS 循证患者教育助手</span>
          <span class="text-[9px] md:text-[10px] text-teal-600 font-mono -mt-1 block">OFFLINE STANDALONE EDITION</span>
        </div>
      </div>
      <div>
        <span class="text-xs bg-teal-50 text-teal-800 border border-teal-200 px-3 py-1 rounded-full font-medium flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></span>
          独立免装单文件版
        </span>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="max-w-4xl mx-auto px-4 pt-8 shrink-0 grow w-full">

    <!-- WELCOME VIEW -->
    <template x-if="viewState === 'welcome'">
      <div class="space-y-8">
        <!-- Hero card -->
        <div class="bg-white rounded-3xl border border-slate-100 p-6 md:p-10 shadow-sm relative overflow-hidden">
          <div class="absolute top-0 right-0 w-80 h-80 bg-teal-50/40 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 w-64 h-64 bg-emerald-50/30 rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>

          <div class="relative max-w-2xl space-y-4">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-teal-50 border border-teal-200 rounded-full text-xs text-teal-800 font-semibold">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-teal-600"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>
              <span>多囊卵巢综合征患者教育平台</span>
            </div>
            
            <h1 class="text-2xl md:text-4xl font-bold text-teal-950 tracking-tight leading-tight">
              探寻您的特异临床表型，配置专属的科学调理方案
            </h1>
            
            <p class="text-slate-600 font-normal leading-relaxed text-sm md:text-base">
              您好！这是针对 PCOS 循证医学调理开发的<b>离线免登录独立版</b>。多囊卵巢综合征是一种复杂的全身内分泌与代谢症候群。由于不同个体体内糖异生、雄激素水平及体重基准大不相同，指南绝对不推荐“万人一方”的粗放疗法。
            </p>

            <p class="text-slate-500 text-xs md:text-sm font-medium leading-relaxed border-l-2 border-teal-500 pl-3.5 bg-teal-50/30 py-2 rounded-r-lg">
              评估流程仅需进行 7 个精心设计的基础问答（完全基于国际多囊指南）。在开始时，我将手把手教您如何用最易懂的家常指标进行自我卡点判断，不编造指标。收集完毕后，为您一键推荐基于国际医学指南的绿（一线推荐）、黄（辅助疗法）、红（辟谣避坑）专属自测科普卡片。
            </p>

            <div class="pt-4">
              <button
                @click="startEvaluation()"
                class="px-8 py-4 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-2xl shadow-lg shadow-teal-600/20 hover:shadow-teal-700/30 transition-all flex items-center justify-center gap-2 group cursor-pointer text-base"
              >
                <span>进入本地7步表型测评</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Three columns -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm flex items-center gap-4">
            <div class="p-3 bg-teal-50 border border-teal-100 rounded-xl text-teal-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-teal-600"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </div>
            <div>
              <span class="block text-xs text-slate-500">中国发病统计</span>
              <strong class="text-base font-bold text-slate-900 block font-sans">约 5.6% - 14.1%</strong>
              <span class="text-[10px] text-slate-400">青年女性极其多见的代谢障碍</span>
            </div>
          </div>
          <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm flex items-center gap-4">
            <div class="p-3 bg-amber-50 border border-amber-100 rounded-xl text-amber-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-amber-600"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div>
              <span class="block text-xs text-slate-500">隐匿胰岛电阻比例</span>
              <strong class="text-base font-bold text-slate-900 block font-sans">可达 75% 程度</strong>
              <span class="text-[10px] text-slate-400">瘦型多囊也有大量细胞级代偿</span>
            </div>
          </div>
          <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm flex items-center gap-4">
            <div class="p-3 bg-emerald-50 border border-emerald-100 rounded-xl text-emerald-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-emerald-500"><path d="M6 12H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 8h12"/><path d="M18 16v-4H6v4"/><path d="M4 16h16a2 2 0 0 1 2 2v3H2v-3a2 2 0 0 1 2-2Z"/></svg>
            </div>
            <div>
              <span class="block text-xs text-slate-500">数据隐私安全</span>
              <strong class="text-base font-bold text-slate-900 block font-sans">100% 纯本地运行</strong>
              <span class="text-[10px] text-slate-400">不经过服务器、保障身心隐私</span>
            </div>
          </div>
        </div>

        <!-- KNOWLEDGE DATABASE FAQ LIST -->
        <div class="bg-white rounded-3xl border border-slate-100 p-6 md:p-8 space-y-6">
          <div class="flex items-center gap-3">
            <div class="p-2.5 bg-teal-50 text-teal-650 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-teal-600"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <div>
              <h2 class="text-lg font-bold text-slate-900">PCOS 循证科学自测百问Q&A</h2>
              <p class="text-xs text-slate-400">打破网络焦虑与谣言陷阱，我们只相信来自国际临床科学的铁律标准</p>
            </div>
          </div>

          <div class="divide-y divide-slate-100">
            <template x-for="(faq, index) in faqs" :key="index">
              <div class="py-4">
                <button
                  @click="toggleFaq(index)"
                  class="w-full flex justify-between items-center text-left font-bold text-sm md:text-base text-slate-800 hover:text-teal-700 transition"
                >
                  <span x-text="faq.q"></span>
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transform transition text-slate-400" :class="activeFaq === index ? 'rotate-180 text-teal-600' : ''"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div
                  x-show="activeFaq === index"
                  x-transition
                  class="mt-2 text-xs md:text-sm text-slate-500 leading-relaxed pl-1"
                  x-text="faq.a"
                ></div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- EVALUATING WIZARD VIEW -->
    <template x-if="viewState === 'evaluating'">
      <div class="max-w-2xl mx-auto bg-white rounded-3xl border border-slate-100 p-6 md:p-8 shadow-sm">
        
        <!-- Wizard Sub-Header Progress Indicator -->
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2">
            <button
              @click="prevStep()"
              x-show="currentStep > 0"
              class="p-1.5 bg-slate-55/6 p-1 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-lg text-slate-600 transition cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rotate-180"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <span class="text-xs md:text-sm font-bold text-teal-950 font-sans">
              问题 <span x-text="currentStep + 1"></span> / 7
            </span>
          </div>
          <span class="text-xs text-slate-500 font-medium">
            评估进度 <span x-text="Math.round(((currentStep) / 7) * 100)"></span>%
          </span>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-8">
          <div class="bg-teal-600 bg-gradient-to-r from-teal-500 to-emerald-500 h-1.5 transition-all duration-300" :style="'width: ' + (((currentStep) / 7) * 100) + '%'"></div>
        </div>

        <!-- Active Question Container -->
        <div class="space-y-6">
          <div>
            <span class="text-[10px] bg-teal-50 text-teal-800 border border-teal-100/60 font-mono font-bold px-2 py-0.5 rounded uppercase tracking-wider">
              Question <span x-text="currentStep + 1"></span> of 7 · 单项选择
            </span>
            <h2 class="text-lg md:text-xl font-bold text-slate-900 mt-2 font-sans" x-text="questions[currentStep].text"></h2>
          </div>

          <!-- Judgement Clinical Helpers Banner -->
          <div class="bg-slate-50/50 border border-dashed border-slate-200/80 rounded-2xl p-4 text-xs text-slate-500 leading-relaxed font-sans">
            <div class="font-bold text-slate-700 flex items-center gap-1.5 mb-1.5 text-[11px] uppercase tracking-wide">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-teal-600"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              指南临床标准小诀窍
            </div>
            <div x-text="questions[currentStep].judgementStandard"></div>

            <!-- Pre-filler tool for BMI question inside q2 -->
            <template x-if="questions[currentStep].id === 'q2'">
              <div class="mt-3 pt-3 border-t border-slate-200/60">
                <button
                  @click="showBmiCalc = !showBmiCalc"
                  class="text-xs text-teal-600 font-bold hover:text-teal-700 inline-flex items-center gap-1 cursor-pointer focus:outline-none"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="12" height="18" x="6" y="3" rx="2" ry="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                  打开本地 BMI & 腰围评测助手（帮我精准决策一键选择）
                </button>

                <div x-show="showBmiCalc" class="bg-slate-50 border-x border-b border-teal-50 rounded-b-xl p-4 mt-1 grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div>
                    <label class="block text-xs text-slate-500 mb-1">身高 (厘米)</label>
                    <input type="number" placeholder="如 160" x-model="heightCm" class="w-full bg-white border border-slate-200 rounded-lg p-2 text-sm focus:outline-teal-400 font-mono">
                  </div>
                  <div>
                    <label class="block text-xs text-slate-500 mb-1">体重 (公斤)</label>
                    <input type="number" placeholder="如 55" x-model="weightKg" class="w-full bg-white border border-slate-200 rounded-lg p-2 text-sm focus:outline-teal-400 font-mono">
                  </div>
                  <div>
                    <label class="block text-xs text-slate-500 mb-1">女性腰围 (厘米 · 可选)</label>
                    <input type="number" placeholder="如 78" x-model="waistCm" class="w-full bg-white border border-slate-200 rounded-lg p-2 text-sm focus:outline-teal-400 font-mono">
                  </div>
                  <div class="md:col-span-3 flex justify-between items-center mt-2 border-t border-slate-100 pt-3">
                    <button @click="calculateBmi()" class="px-4 py-1.5 bg-teal-600 hover:bg-teal-700 text-white rounded-lg text-xs font-semibold transition shadow-sm">
                      计算健康指标并预填体重
                    </button>
                    <div class="text-right" x-show="calculatedBmi !== null">
                      <span class="text-xs text-slate-500 mr-2">BMI: <strong class="font-mono text-teal-700" x-text="calculatedBmi"></strong></span>
                      <span class="text-xs px-2 py-0.5 bg-teal-50 border border-teal-200 text-teal-800 rounded-full font-medium" x-text="bmiCategory"></span>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- Options List -->
          <div class="space-y-4">
            <template x-for="opt in questions[currentStep].options" :key="opt.value">
              <button
                @click="selectOption(opt.value)"
                class="w-full text-left p-4 md:p-5 rounded-2xl border transition-all duration-200 flex items-start gap-4 cursor-pointer focus:outline-none animate-fade-in"
                :class="isOptionSelected(opt.value) ? 'bg-teal-50/80 border-teal-500 ring-2 ring-teal-500/10 shadow-xs' : 'bg-white border-slate-200 hover:border-teal-300 hover:bg-teal-50/5'"
              >
                <div class="w-5 h-5 rounded-full border shrink-0 flex items-center justify-center mt-0.5"
                     :class="isOptionSelected(opt.value) ? 'border-teal-600 bg-teal-600' : 'border-slate-300 bg-white'"
                >
                  <div class="w-2.5 h-2.5 bg-white rounded-full" x-show="isOptionSelected(opt.value)"></div>
                </div>
                <div class="grow">
                  <p class="font-semibold text-sm md:text-base text-slate-900" x-text="opt.label" :class="isOptionSelected(opt.value) ? 'text-teal-950' : 'text-slate-900'"></p>
                  <p class="text-xs md:text-sm text-slate-500 mt-1 leading-relaxed" x-text="opt.desc"></p>
                </div>
              </button>
            </template>
          </div>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6 leading-relaxed">
          温馨提示：本评估基于多囊临床医学推荐，不构成直接用药依据。仅为健康学术性自测科普。
        </p>
      </div>
    </template>

    <!-- RESULT PROFILE VIEW -->
    <template x-if="viewState === 'result'">
      <div class="max-w-3xl mx-auto space-y-8">
        <!-- Header Utility Panel -->
        <div class="flex justify-between items-center no-print">
          <button
            @click="resetApp()"
            class="flex items-center gap-2 px-4 py-2 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 rounded-xl text-sm font-medium transition-all shadow-sm"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            <span>重新录入进行评估</span>
          </button>
          <button
            @click="window.print()"
            class="flex items-center gap-2 px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-sm font-semibold transition-all shadow-sm"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14v6h12v-6"/><path d="M6 8h12"/></svg>
            <span>保存自测报告/打印</span>
          </button>
        </div>

        <!-- Profile Hero -->
        <div class="bg-gradient-to-br from-teal-700 via-teal-800 to-emerald-950 rounded-2xl p-6 md:p-8 text-white relative overflow-hidden shadow-md">
          <div class="absolute top-0 right-0 w-64 h-64 bg-teal-600/20 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 w-48 h-48 bg-emerald-500/10 rounded-full blur-2xl -ml-16 -mb-16 pointer-events-none"></div>

          <div class="relative">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
              <span class="text-xs bg-emerald-500/20 text-emerald-300 border border-emerald-400/30 px-3 py-1 rounded-full font-mono font-bold tracking-wider">
                CLINICAL PROFILE CASE: <span x-text="matchedProfile.id"></span>
              </span>
              <template x-if="matchedProfile.id.startsWith('2') || matchedProfile.id === '3.2' || matchedProfile.id === '3.4'">
                <span class="text-xs bg-pink-500/20 text-pink-300 border border-pink-400/30 px-3 py-1 rounded-full font-medium flex items-center gap-1">
                  👶 孕备孕黄金期
                </span>
              </template>
            </div>

            <h1 class="text-2xl md:text-3xl font-bold tracking-tight" x-text="matchedProfile.title"></h1>
            <p class="text-emerald-100/90 text-sm mt-2 font-light leading-relaxed">
              基于您在问卷中反馈的多囊状况，我们匹配了专属于您的循证医学管理及避坑方案：
            </p>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mt-6 pt-6 border-t border-teal-600/40">
              <div class="bg-teal-900/40 border border-teal-700/40 p-2.5 rounded-xl">
                <span class="block text-[10px] text-teal-300">主要困扰</span>
                <strong class="text-xs md:text-sm font-semibold text-teal-50 block truncate mt-0.5" x-text="matchedProfile.concernText"></strong>
              </div>
              <div class="bg-teal-900/40 border border-teal-700/40 p-2.5 rounded-xl">
                <span class="block text-[10px] text-teal-300">体重状况</span>
                <strong class="text-xs md:text-sm font-semibold text-teal-50 block truncate mt-0.5" x-text="matchedProfile.weightText"></strong>
              </div>
              <div class="bg-teal-900/40 border border-teal-700/40 p-2.5 rounded-xl">
                <span class="block text-[10px] text-teal-300">血糖胰岛</span>
                <strong class="text-xs md:text-sm font-semibold text-teal-50 block truncate mt-0.5" x-text="matchedProfile.glycemicText"></strong>
              </div>
              <div class="bg-teal-900/40 border border-teal-700/40 p-2.5 rounded-xl">
                <span class="block text-[10px] text-teal-300">备孕意向</span>

            text: "根据您的月经和排卵，请问您是否有“排卵障碍”情况？",
            judgementStandard: "符合任意一条即可选“是”：①月经周期极度推迟或频发无序；②生理期常常多于 35 天或连续数月不来（非怀孕）；③需靠服用黄体酮等催经药调理行红。",
            options: [
              { value: 1, label: "1. 是的，有排卵障碍或严重推迟（周期多超35天或闭经）", desc: "生理期大延迟，年均行红次数少于8次，或长期依赖孕酮药物性撤退催红。" },
              { value: 2, label: "2. 否，排卵与经期基本规律（多在 21-35 天内自发并规律行经）", desc: "每个月月经大体上能自发按时来临，极少甚至从未出现连续多月断崖停经。" }
            ]
          },
          {
            id: 'q7',
            text: "根据妇科 B 超或彩超检查，请问您是否有卵巢“多囊样改变”的表现？",
            judgementStandard: "符合任意一条即可选“是”：①超声报告明确指出有“多囊样改变”或“PCOM”外观；②一侧或双侧卵巢中，直径 2-9mm 的预备小窦卵泡数目 ≥ 12 个（或 ≥ 20 个）。",
            options: [
              { value: 1, label: "1. 是，曾有超声检查提示卵巢多囊样改变 (PCOM)", desc: "彩超影像提示窦卵泡堆积（一侧或双侧窦房卵泡见多，常达到12个或20个判断警戒线）。" },
              { value: 2, label: "2. 否，超声影像显示卵巢窦卵泡数量正常", desc: "排卵探查或彩超未见窦卵泡过度密集的链条排部，外观在标准匀衬尺度内。" }
            ]
          }
        ],

        startEvaluation() {
          this.viewState = 'evaluating';
          this.currentStep = 0;
          this.scrollUp();
        },

        prevStep() {
          if (this.currentStep > 0) {
            this.currentStep--;
          }
        },

        selectOption(value) {
          const currentKey = this.questions[this.currentStep].id;
          this.answers[currentKey] = value;
          
          setTimeout(() => {
            if (this.currentStep < this.questions.length - 1) {
              this.currentStep++;
            } else {
              this.viewState = 'result';
            }
            this.scrollUp();
          }, 300);
        },

        isOptionSelected(value) {
          const currentKey = this.questions[this.currentStep].id;
          return this.answers[currentKey] === value;
        },

        calculateBmi() {
          const h = parseFloat(this.heightCm);
          const w = parseFloat(this.weightKg);
          if (!h || !w || h <= 0 || w <= 0) return;

          const heightM = h / 100;
          const bmi = w / (heightM * heightM);
          this.calculatedBmi = Math.round(bmi * 10) / 10;

          const wc = parseFloat(this.waistCm);
          const isAbdominal = wc >= 80;

          let targetSel = 2; // Lean/Standard

          if (this.calculatedBmi >= 24 || isAbdominal) {
            this.bmiCategory = this.calculatedBmi >= 28 ? '肥胖 (推荐选: 超重/肥胖)' : '超重 (推荐选: 超重/肥胖)';
            if (isAbdominal && this.calculatedBmi < 24) {
              this.bmiCategory = '腹型肥胖 (推荐选: 超重/肥胖)';
            }
            targetSel = 1;
          } else {
            this.bmiCategory = this.calculatedBmi < 18.5 ? '偏瘦 (推荐选: 正常/偏瘦)' : '标准体重 (推荐选: 正常/偏瘦)';
            targetSel = 2;
          }

          this.answers.q2 = targetSel;
        },

        get pcosPhenotype() {
          const { q5, q6, q7 } = this.answers;
          if (q5 === null || q6 === null || q7 === null) return null;

          const hasAndrogen = q5 === 1;
          const hasOvulatory = q6 === 1;
          const hasPcom = q7 === 1;

          const criteriaCount = (hasAndrogen ? 1 : 0) + (hasOvulatory ? 1 : 0) + (hasPcom ? 1 : 0);

          if (criteriaCount < 2) {
            return {
              type: "未满足典型 PCOS 诊断分型",
              subName: "暂不符合 Rotterdam 经典诊断大标准",
              code: "N/A",
              tagColor: "bg-slate-100 border-slate-200 text-slate-700",
              desc: "根据 2003 年国际 Rotterdam 多囊卵巢综合征诊断标准，其需要满足“高雄激素”、“排卵障碍（月经稀发/闭经）”、“卵巢多囊样改变（PCOM）”三项中的至少两项。您的自测指标暂未完全符合典型 PCOS 临床诊断门槛，可能仅伴随单项排卵/月经异常。但这不阻碍参考下方的精细生活及循证调理计划开展自律保养。"
            };
          }

          if (hasAndrogen && hasOvulatory && hasPcom) {
            return {
              type: "A型 · 经典最全表型",
              subName: "高雄激素 + 排卵障碍 + 卵巢多囊样改变 (PCOM)",
              code: "A",
              tagColor: "bg-rose-50 border-rose-200 text-rose-700",
              desc: "这是经典‘多囊三要素完全聚齐’的重叠/完整表型。往往伴随着突出的雄激素溢出压力（体毛重、皮质痤疮或脱发）以及潜在的全身脂质/血糖代谢敏感度下降（胰岛素抵抗）。调护重心不仅在于规律子宫内膜剥脱（月经调理）和适氧呼吸、低GI膳食，也提倡加强力量训练，稳固胰岛健康防御线。"
            };
          }

          if (hasAndrogen && hasOvulatory && !hasPcom) {
            return {
              type: "B型 · 无多囊结构表型",
              subName: "高雄激素 + 排卵障碍（超声未见典型多囊改变）",
              code: "B",
              tagColor: "bg-amber-50 border-amber-200 text-amber-700",
              desc: "该表型表现为雄激素增高（有高雄特征）且伴有排卵稀发，但在B超影像下卵巢并无经典的、单侧窦卵泡数目显著密集如项链般的改变。干预核心主要在于调节‘下丘脑-垂体-卵巢轴（HPO轴）’信号通路的灵敏度、清降低度炎性微环境、协同抗氧化多酚饮食恢复正常的月经。"
            };
          }

          if (hasAndrogen && !hasOvulatory && hasPcom) {
            return {
              type: "C型 · 排卵性特殊表型",
              subName: "高雄激素 + 卵巢多囊样改变 (月经与排卵通常自发存在)",
              code: "C",
              tagColor: "bg-emerald-50 border-emerald-200 text-emerald-700",
              desc: "俗称‘排卵性 PCOS’，患者每个月通常都有自发的卵泡破裂排出，代表受孕的黄金实力被很好保留；但他具有体格化验睾酮偏高、或有下巴背部顽固痤疮及小粗汗毛，伴彩超多囊（PCOM）。策略主要在于通过膳食脂肪酸调整与外源抗雄阻击体内活性雄激素，保护卵子活力。"
            };
          }

          if (!hasAndrogen && hasOvulatory && hasPcom) {
            return {
              type: "D型 · 非高雄柔和型",
              subName: "排卵障碍 + 卵巢多囊样改变 (不伴高雄激素特征)",
              code: "D",
              tagColor: "bg-sky-50 border-sky-200 text-sky-700",
              desc: "该类型被称为‘非高雄多囊’。您的化验单往往没有任何上升雄激素箭头、皮肤也清爽无多毛脱发。但由于一侧或双侧卵泡数见多，卵泡由于局部微环境难以自发募集长大，导致姨妈缺勤延迟。您的胰岛系血管相比更安全，备孕期需更注重卵泡细胞的营养输送、托举单兵卵泡发育。"
            };
          }

          return null;
        },

        get matchedProfile() {
          const { q1, q2, q3, q4 } = this.answers;
          if (q1 === null || q2 === null || q3 === null || q4 === null) {
            return pcosData["1.1"];
          }

          if (q4 === 1) { // Pregnancy priority
            if (q1 === 3) {
              return q2 === 1 ? pcosData["3.2"] : pcosData["3.4"];
            } else {
              if (q2 === 1) {
                return q3 === 1 ? pcosData["2.2"] : pcosData["2.1"];
              } else {
                return q3 === 1 ? pcosData["2.4"] : pcosData["2.3"];
              }
            }
          } else { // Regulating/Metabolic scale
            if (q1 === 3) {
              return q2 === 1 ? pcosData["3.1"] : pcosData["3.3"];
            } else {
              if (q2 === 1) {
                return q3 === 1 ? pcosData["1.2"] : pcosData["1.1"];
              } else {
                return q3 === 1 ? pcosData["1.4"] : pcosData["1.3"];
              }
            }
          }
        },

        toggleFaq(idx) {
          this.activeFaq = this.activeFaq === idx ? null : idx;
        },

        resetApp() {
          this.viewState = 'welcome';
          this.currentStep = 0;
          this.answers = { q1: null, q2: null, q3: null, q4: null, q5: null, q6: null, q7: null };
          this.calculatedBmi = null;
          this.heightCm = '';
          this.weightKg = '';
          this.waistCm = '';
          this.scrollUp();
        },

        scrollUp() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
    }
  </script>
